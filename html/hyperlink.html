<!DOCTYPE html>
<html lang="en">
<head>
   <meta name="author" content="Jenishakharbuja">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlink and floating image example</title>
</head>
<style>
    a{
        color: black;
        text-align: justify;
        text-decoration-line: underline;

    }
    a:hover{
        color: greenyellow;
    }
    a:visited{
        color: tomato;
    }
</style>
<body>
    <a href="https://google.com" target="_blank">Open in New Tab</a><br><br>
    <a href="https://google.com" target="_parent">Opens the link in the parent frame.</a><br><br>
    <a href="https://google.com" target="_self">Open in New browser in itself orin the same tab/window (default). </a><br><br>
    <a href="https://google.com" target="_top">Opens the link in the full body of the window.</a><br><br>
<p><strong>floating image example</strong></p>
<img src="rectangle.jpg" alt="rectangle image" style="float:right ; width:200px ; height: 200px;">
