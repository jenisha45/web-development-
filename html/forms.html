<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jenishakharbuja">
    <title>Form example</title>
</head>

<body>
    <h3 style=" text-align: center;"> Form Example </h3>
    <form method="get" action="#">
        <fieldset>
            <!-- <legend>Personal details</legend> -->
            <header><b>Personal details</b></header>
            <br>
            <div class="name">
                <label for="firstname">Firstname:</label>
                <input type="text" name="form" id="firstname" placeholder="Enter your name" required>
                <label for="middlename"> Middle name:</label>
                <input type="text" id="middlename" placeholder="Enter your middle name">
                <label for="lastname"> Last name:</label>
                <input type="text" id="lastname" placeholder="Enter your last name" required>
            </div>
            <br>
            <label for="Email-id">Email-id:</label>
            <input type="email" id="Email-id" placeholder="Enter your Email-id" required> <br><br>
            <label for="Contact">Contact:</label>
            <input type="tel" id="Contact" placeholder="Enter your Contact" required><br><br>
            <label for="Address">Address:</label>
            <input type="text" id="Address" placeholder="Enter your Address" required
                autocomplete="address-level1"/><br><br>
            <div class="Nation">
                <label for="country">Country:</label>
                <select id="country" name="country" required ">
                    <option value="">Select a Country</option>
                    <option value="Nepal">Nepal</option>
                    <option value="Japan">Japan</option>
                    <option value="China">China</option>
                    <option value="Australia">Australia</option>
                    <option value="South Korea">South Korea</option>
                    <option value="Thailand">Thailand</option>
                    <option value="Taiwan">Taiwan</option>
                </select>

            </div><br>
            <div class="gender">
                <!-- <label for="gender">Gender:</label> -->
                <legend>Gender:</legend>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <!-- name is used to indicate that the elements are in same grp -->
                <label for="female">Female</label>
            </div><br>
            <div class="hobbies">
                <!-- <label>Select a hobby:</label><br> -->
                <legend>Select a hobby:</legend>
                <label>
                    <input type="checkbox" name="hobbies" value="basketball">
                    basketball
                </label><br>
                <label>
                    <input type="checkbox" name="hobbies" value="crocheting">
                    crocheting
                </label><br>
                <label>
                    <input type="checkbox" name="hobbies" value="travelling">
                    travelling
                </label><br>
                <label>
                    <input type="checkbox" name="hobbies" value="basketball">
                    basketball
                </label><br>
                <label>
                    <input type="checkbox" name="hobbies" value="gym">
                    gym
                </label><br>
                <!-- <label>
                    <input type="checkbox" name="hobbies" value="nothing">
                    nothing
                </label><br><br> -->
            </div><br>
            <label for="password">Enter  your password:
        <input type="password"><br><br>
            </label>
         <details>
            <summary>password</summary>
            <input type="password"><br><br>
        </details>
            <label for="Date">Form filled date and time :</label>
            <input type="datetime-local" id="Date" name="date">
            <br><br>
            <label for="File">Upload file:</label>
            <input type="file" id="File">
            <br><br>
            <input type="submit"><br><br>
    </form>
    </fieldset>
</body>

</html>
