<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id in Css</title>
</head>
<style>
    /* ID Selector */
    #main-heading {
        color: blue;
        font-size: 24px;
    }
    #highlight {
        background-color: yellow;
    }

    #btn {
        padding: 10px 20px;
        background-color: green;
        color: white;
        border: none;
    }
    #se
    {
        color: aqua;
        font-size: large;
    }
    #app
    {
        border: 2px solid black;
    }
</style>

<body>
    <h1 id="se">Use of id</h1>
    <p id="app">
        Lorem, ipsum dolor.
    </p>
    <h1 id="main-heading">Welcome to My
        Website</h1>
    <p id="highlight">This paragraph is
        highlighted.</p>
    <p id="highlight">This paragraph is also
        highlighted.</p>
    <button id="btn">Submit</button>
    <button id="btn">Cancel</button>

</html>
