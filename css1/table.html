<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table properties in CSS</title>
</head>
<style>
div{
    overflow-y: scroll;
}
table
{
    border-collapse: separate;
    /* border-collapse: collapse; */
    width: 100%;
    height: 40%;
    border: 4px solid blueviolet;
    table-layout: fixed;
    margin-top: 20px;
    empty-cells: hide;
    background-color: #eae8e8;
    text-align: end;
}
caption
{
    caption-side: bottom;
    font-size: large;
    font-family: 'Courier New', Courier, monospace;
    text-align: justify;
    vertical-align: middle;
}
tr:nth-child(odd)
{
    color: rgb(255, 3, 3);
}
</style>
<body>
    <div>
        <table border="2" cellpadding="30">
            <caption>Styling table</caption>
            <tr>
                <td></td>
            <!-- hides this cell border as there is no element -->
            <td colspan="2">2</td>
        </tr>
        <tr>
            <td rowspan="2">4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
        </tr>
    </table>
</div>
</body>
</html>
